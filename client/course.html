<!DOCTYPE html>
<html>
<head>
  <title>Course Content</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="container">
  <h1 id="courseTitle"></h1>

  <!-- Add Content -->
  <div class="add-course">
    <input id="contentTitle" placeholder="Content Title" type="text">

    <!-- Content Type Selection -->
    <select id="contentType" onchange="toggleContentInput()">
      <option value="video">YouTube Video</option>
      <option value="pdf">PDF Document</option>
    </select>

    <!-- YouTube Video Input -->
    <div id="videoInput" class="content-input">
      <input id="videoUrl" placeholder="YouTube Video URL (e.g., https://www.youtube.com/watch?v=...)" type="url">
    </div>

    <!-- PDF Upload Input -->
    <div id="pdfInput" class="content-input" style="display: none;">
      <input id="pdfFile" type="file" accept=".pdf" onchange="updateFileName()">
      <div id="fileName" class="file-name" onclick="document.getElementById('pdfFile').click()">No file selected</div>
      <div class="file-info">Click to select PDF file (max 10MB)</div>
    </div>

    <button onclick="addContent()">Add Content</button>
  </div>

  <!-- Content List -->
  <div id="contentList"></div>

  <br>
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
</div>

<script src="js/course.js"></script>
</body>
</html>
